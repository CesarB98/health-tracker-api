spring:
  application:
    name: health-tracker-api

  datasource:
    url: jdbc:postgresql://localhost:5432/healthtracker
    username: postgres
    password: qwer1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080